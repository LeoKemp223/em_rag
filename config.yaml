# config.yaml
embedding:
  provider: "local"                              # "local" | "openai"
  local_model: "all-MiniLM-L6-v2"                # ONNX 格式
  model_dir: "./models"
  # openai_api_key: ""
  # openai_model: "text-embedding-3-small"

parsing:
  table_strategy: "pdfplumber"
  use_bookmarks: true
  fallback_to_markdown_headings: true

chunking:
  max_tokens: 1000
  overlap_tokens: 100
  keep_tables_intact: true
  split_at_semantic_boundary: true

storage:
  chroma_path: "./data/chroma_db"
  fts_path: "./data/fts.db"

figures:
  enabled: true
  mode: "timing_related"        # "timing_related" | "all"
  detection: "heuristic"        # "heuristic" | "hybrid" | "llm"
  save_full_page: true
  save_crops: true
  render_dpi: 180
  output_dir: "./data/figures"
  llm_provider: "openai"
  llm_model: "gpt-4.1"          # 准确率优先；可改为更便宜的 mini 模型
  # llm_api_key: ""             # 留空时读取 OPENAI_API_KEY
  # llm_base_url: ""            # OpenAI-compatible endpoint，可选
  min_confidence: 0.65
  candidate_context_chars: 6000

documents:
  source_dir: "./data/documents"

retrieval:
  top_k: 5
  keyword_priority: true
  context_expand: true
